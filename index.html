<!DOCTYPE html>
<html>
<head>
    <title>Library Management</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 10px; display: inline-block; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #0f172a; color: white; }
        button { width: 96%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #94a3b8; text-align: left; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <div id="loginDiv">
            <h2>Library Login</h2>
            <input type="text" id="u" placeholder="Username (e.g. Ashok)">
            <input type="password" id="p" placeholder="Password">
            <button onclick="call('login', ['u','p'])">Login</button>
        </div>

        <div id="dashDiv" class="hidden">
            <h2 id="greet"></h2>
            <div id="adminPanel" class="hidden">
                <input type="text" id="bid" placeholder="Book ID">
                <input type="text" id="bn" placeholder="Book Name">
                <input type="text" id="ba" placeholder="Author">
                <input type="number" id="bq" placeholder="Qty">
                <button onclick="call('add_book', ['bid','bn','ba','bq'])">Add Book</button>
            </div>
            <div id="userPanel" class="hidden">
                <input type="text" id="ibn" placeholder="Book Name to Issue">
                <button onclick="issue()">Issue Book</button>
            </div>
            <button onclick="call('view_books', [])" style="background:#10b981; margin-top:10px;">View Inventory</button>
            <button onclick="location.reload()" style="background:#ef4444; margin-top:10px;">Logout</button>
        </div>

        <div id="status">Status: Waiting...</div>
    </div>

    <script>
        let session = {};
        async function call(act, ids) {
            const vals = ids.map(id => document.getElementById(id).value);
            const res = await fetch('/api', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: act, args: vals })
            });
            const data = await res.json();
            
            if(act === 'login' && data.success) {
                session = data;
                document.getElementById('loginDiv').classList.add('hidden');
                document.getElementById('dashDiv').classList.remove('hidden');
                document.getElementById('greet').innerText = "Hi, " + data.name;
                if(data.role === 'admin') document.getElementById('adminPanel').classList.remove('hidden');
                else document.getElementById('userPanel').classList.remove('hidden');
            }
            document.getElementById('status').innerHTML = data.message || JSON.stringify(data);
        }

        async function issue() {
            const bn = document.getElementById('ibn').value;
            const res = await fetch('/api', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'issue_book', args: [session.id, session.name, bn] })
            });
            const data = await res.json();
            document.getElementById('status').innerHTML = data.message;
        }
    </script>
</body>
</html>
